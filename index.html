<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>音符迷宫 | Note Maze</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <!-- 左侧：Logo + 金币 -->
    <div class="header-left">
      <div class="logo">🎵 音符迷宫</div>
      <div class="coin-display">💰 <span id="total-coins">0</span></div>
    </div>

    <!-- 中间：难度选择 -->
    <div class="difficulty-selector">
      <button data-size="5" class="active">简单(5×5)</button>
      <button data-size="8">中等(8×8)</button>
      <button data-size="12">困难(12×12)</button>
    </div>

    <!-- 右侧：控制按钮 -->
    <div class="header-controls">
      <div class="control-row">
        <button id="hint-btn" class="control-btn">💡 提示</button>
        <button id="undo-btn" class="control-btn" disabled>⬅️ 回退</button>
      </div>
      <div class="control-row">
        <button id="restart-btn" class="control-btn">🔄 重开</button>
        <button id="volume-btn" class="control-btn">🔊 80%</button>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- 左侧面板 -->
    <aside class="left-panel">
      <h3>🎼 选曲</h3>
      <ul id="song-list" class="song-list"></ul>

      <div class="info-box">
        <div class="progress-wrapper">
          <label>进度</label>
          <progress id="progress-bar" value="0" max="100"></progress>
          <span id="progress-text">0 / 0</span>
        </div>
        <p>⚠️ 失误次数：<span id="mistakes">0</span></p>
      </div>
    </aside>

    <!-- 中间迷宫 -->
    <section class="game-area">
      <div id="maze-board" class="maze-board"></div>
      <div id="message" class="message hidden"></div>
    </section>

    <!-- 右侧面板 -->
    <aside class="right-panel">
      <div class="guide" style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #2a2d45;">
        <h3>📖 操作说明</h3>
        <ul>
          <li>⌨️ 电脑：方向键 ↑ ↓ ← →</li>
          <li>📱 手机：屏幕滑动控制</li>
          <li>🎯 严格按旋律顺序踩中音符</li>
          <li>❌ 踩错可退回重走，你可以点击出示路径</li>
        </ul>
      </div>
      <div class="stats" style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #2a2d45;">
        <h3>📜 本局战绩</h3>
        <p>已通关：<span id="win-count">0</span> 次</p>
        <p>总步数：<span id="total-steps">0</span> 步</p>

        <!-- 🆕 积分显示区域 -->
        <div class="score-box" style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #2a2d45;">
          <h3>🏆 得分</h3>
          <p>💰 本局得分：<span id="current-score" style="color: #f4d03f; font-weight: bold;">0</span></p>
          <p>🥇 总积分：<span id="total-score" style="color: #f4a261; font-weight: bold;">0</span></p>
        </div>
      </div>
    </aside>
  </main>

  <!-- 移动端音频初始化提示 -->
  <div id="audio-init-overlay" class="audio-init">
    <div class="init-box">🎧 点击任意处开启音频<br><small>(浏览器安全策略限制)</small></div>
  </div>

  <div id="mistake-modal" class="modal hidden">
    <div class="modal-content">
      <h3> 🤓 需要帮助吗？</h3>
      <p>你已经失误 <strong>5</strong> 次了</p>
      <p>要不要显示路径？</p>
      <div class="modal-buttons">
        <button id="modal-hint-btn" class="btn-primary">💡 出示路径</button>
        <button id="modal-close-btn" class="btn-secondary">❌ 我再试试</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="game.js"></script>
</body>
</html>
